<!-- templates/article_detail.html -->
{% extends "base.html" %}
{% block title %}{{ item.title }} - 论文详情{% endblock %}
{% block content %}
<h2>📄 {{ item.title }}</h2>

<div style="text-align: left; max-width: 750px; margin: 0 auto;">
  <p><strong>作者：</strong>{{ item.authors|join(', ') }}</p>
  <p><strong>发表于：</strong>{{ item.venue }}, {{ item.year }}</p>

  <div style="margin-top: 20px; padding: 16px; background: #f8fafc; border-radius: 8px;">
    <p style="margin: 0; white-space: pre-wrap;">{{ item.abstract }}</p>
  </div>

  <div style="margin-top: 30px; text-align: center;">
    <a href="/download_file/{{ item.id }}" class="btn">⬇️ 直接下载</a>
  </div>
</div>
{% endblock %}
